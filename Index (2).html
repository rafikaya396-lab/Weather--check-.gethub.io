<!DOCTYPE html><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aya Weather</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;900&display=swap');
*{margin:0;box-sizing:border-box}
body{font-family:'Poppins';color:#fff;min-height:100vh;padding:15px;overflow-x:hidden;transition:1s}
.bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;transition:1.5s}
/* خلفيات متحركة */
.bg-clear{background:linear-gradient(135deg,#47c6ff,#0072ff)}
.bg-clear::before{content:'';position:absolute;width:200px;height:200px;background:radial-gradient(circle,#ffd700,transparent 70%);top:10%;right:10%;border-radius:50%;animation:sun 20s linear infinite;filter:blur(20px);opacity:.6}
@keyframes sun{0%{transform:rotate(0deg) scale(1)}50%{transform:rotate(180deg) scale(1.2)}100%{transform:rotate(360deg) scale(1)}}
.bg-clouds{background:linear-gradient(135deg,#bdc3c7,#2c3e50)}
.bg-clouds::before,.bg-clouds::after{content:'☁️';position:absolute;font-size:80px;opacity:.3;animation:cloud 30s linear infinite}
.bg-clouds::before{top:15%;left:-100px;animation-delay:0s}
.bg-clouds::after{top:40%;left:-100px;font-size:120px;animation-delay:15s}
@keyframes cloud{0%{transform:translateX(0)}100%{transform:translateX(calc(100vw + 200px))}}
.bg-rain{background:linear-gradient(135deg,#4b79a1,#283e51)}
.bg-rain::before{content:'';position:absolute;width:100%;height:100%;background-image:linear-gradient(transparent,rgba(255,255,255,.3));background-size:2px 100px;animation:rain .5s linear infinite}
@keyframes rain{0%{background-position:0 0}100%{background-position:0 100px}}
.bg-snow{background:linear-gradient(135deg,#83a4d4,#b6fbff)}
.bg-snow::before{content:'❄️ ❄️ ❄️ ❄️ ❄️';position:absolute;width:100%;font-size:20px;opacity:.6;animation:snow 10s linear infinite;white-space:nowrap}
@keyframes snow{0%{transform:translateY(-100px)}100%{transform:translateY(100vh)}}

.c{background:rgba(0,0,0,0.25);backdrop-filter:blur(20px);padding:20px;border-radius:30px;max-width:480px;margin:auto;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
input,button{padding:12px;border:none;border-radius:25px;margin:5px;font-family:'Poppins'}
input{background:rgba(255,255,255,0.2);color:#fff;width:70%}
button{background:rgba(255,255,255,0.3);color:#fff;cursor:pointer}
.icon{font-size:4.5rem;margin:10px 0;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.temp{font-size:3.5rem;font-weight:900}
.city{font-size:1.4rem;font-weight:700}.desc{opacity:.9;margin-bottom:10px;text-transform:capitalize}
.alert{padding:10px;background:rgba(255,193,7,0.3);border-radius:15px;margin:10px 0;font-size:.85rem;display:none}
.aqi{padding:6px 12px;border-radius:20px;display:inline-block;font-weight:700;font-size:.85rem;margin:8px}
.g{background:#4ade80;color:#000}.m{background:#fbbf24;color:#000}.b{background:#f87171}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:15px 0}
.box{background:rgba(0,0,0,0.2);padding:10px;border-radius:15px;font-size:.8rem}
.box strong{display:block;font-size:1rem;margin-top:2px}
.map{width:100%;height:160px;border-radius:20px;margin:15px 0;overflow:hidden}
.map iframe{width:100%;height:100%;border:0}
.days{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-top:10px}
.day{background:rgba(0,0,0,0.2);padding:6px;border-radius:12px;font-size:.75rem}
.day .e{font-size:1.4rem;margin:3px 0}
.clock{font-size:1rem;font-weight:700;margin-bottom:10px}
</style>

<div class="bg bg-clear" id="bg"></div>
<div class="c">
<div class="clock" id="clk">--:--:--</div>
<input id="q" placeholder="City" value="Agdal"><button onclick="w()">Go</button>
<div class="icon" id="i">☀️</div><div class="temp" id="t">--°</div>
<div class="city" id="n">--</div><div class="desc" id="d">--</div>
<div class="alert" id="a"></div><div class="aqi" id="aq">AQI: --</div>
<div class="grid">
<div class="box">Feels<strong id="f">--°</strong></div>
<div class="box">Humidity<strong id="h">--%</strong></div>
<div class="box">Wind<strong id="wi">--</strong></div>
<div class="box">UV<strong id="uv">--</strong></div>
<div class="box">Sunrise<strong id="sr">--</strong></div>
<div class="box">Sunset<strong id="ss">--</strong></div>
</div>
<div class="map" id="m"></div>
<div class="days" id="ds"></div>
<div style="font-size:.7rem;opacity:.6;margin-top:15px">Made by <b>Aya</b> ❤️</div>
</div>

<audio id="s" loop><source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_2d7f2d3e5c.mp3"></audio>

<script>
setInterval(()=>clk.textContent=new Date().toLocaleTimeString(),1000);
async function w(){
let c=q.value.trim();if(!c)return;
try{
let r=await fetch(`https://wttr.in/${c}?format=j1`);if(!r.ok)throw 0;
let j=await r.json(),cu=j.current_condition[0],as=j.weather[0].astronomy[0],lat=j.nearest_area[0].latitude,lon=j.nearest_area[0].longitude;
t.textContent=cu.temp_C+'°';n.textContent=j.nearest_area[0].areaName[0].value;d.textContent=cu.weatherDesc[0].value;
f.textContent=cu.FeelsLikeC+'°';h.textContent=cu.humidity+'%';wi.textContent=cu.windspeedKmph+'km/h';
uv.textContent=cu.uvIndex;sr.textContent=as.sunrise;ss.textContent=as.sunset;
m.innerHTML=`<iframe src="https://www.openstreetmap.org/export/embed.html?bbox=${lon-0.05},${lat-0.05},${lon+0.05},${lat+0.05}&layer=mapnik&marker=${lat},${lon}"></iframe>`;
let aq=Math.floor(Math.random()*3);aq.className='aqi '+(aq==0?'g':aq==1?'m':'b');aq.textContent='AQI: '+(aq==0?'Good 😊':aq==1?'Mid 😐':'Bad 😷');
let cd=+cu.weatherCode,tp=+cu.temp_C;i.textContent=cd==113?'☀️':[116,119,122].includes(cd)?'☁️':[176,263,266,293,296,299,302,305,308].includes(cd)?'🌧️':[179,227,230,323,326].includes(cd)?'❄️':[200,386,389].includes(cd)?'⛈️':'🌈';

// خلفية متحركة على حساب الطقس
bg.className='bg';if(cd==113)bg.classList.add('bg-clear');
else if([116,119,122].includes(cd))bg.classList.add('bg-clouds');
else if([176,263,266,293,296,299,302,305,308].includes(cd)){bg.classList.add('bg-rain');s.play()}
else if([179,227,230,323,326,329,332,335,338].includes(cd))bg.classList.add('bg-snow');
else bg.classList.add('bg-clear');

if([176,263,266,293,296,299,302,305,308].includes(cd)){a.style.display='block';a.textContent='☔ Rain! Take umbrella!'}
else if(tp>38){a.style.display='block';a.textContent='🔥 Extreme heat! Stay hydrated!';s.pause()}
else{a.style.display='none';s.pause()}
ds.innerHTML='';j.weather.slice(0,5).forEach((y,x)=>{let dc=+y.hourly[4].weatherCode,em=dc==113?'☀️':[116,119,122].includes(dc)?'☁️':[176,263,266,293,296].includes(dc)?'🌧️':'❄️';let dn=x==0?'Now':new Date(y.date).toLocaleDateString('en',{weekday:'short'});ds.innerHTML+=`<div class="day">${dn}<div class="e">${em}</div><b>${y.maxtempC}°</b>/${y.mintempC}°</div>`});
}catch{t.textContent='--°';n.textContent='City Not Found';d.textContent='Check spelling';i.textContent='❌';ds.innerHTML=m.innerHTML=a.style.display='none';bg.className='bg bg-clear'}}
q.onkeypress=e=>e.key=='Enter'&&w();w();
</script>
